openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Healthcare Appointment System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: patients
    description: Patient operations
  - name: doctors
    description: Doctor operations
  - name: appointments
    description: Appointment operations
  - name: slots
    description: Doctor availability slots
  - name: reports
    description: Medical reports
  - name: prescriptions
    description: Prescriptions
  - name: reviews
    description: Doctor reviews
  - name: emergency
    description: Emergency cases
  - name: search
    description: Search
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /doctors:
    get:
      operationId: getDoctors
      tags: [doctors]
      summary: List doctors
      parameters:
        - name: specialization
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorListResponse"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get doctor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateDoctor
      tags: [doctors]
      summary: Update doctor profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDoctorBody"
      responses:
        "200":
          description: Updated doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorDetail"

  /doctors/{id}/dashboard:
    get:
      operationId: getDoctorDashboard
      tags: [doctors]
      summary: Doctor dashboard data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorDashboard"

  /doctors/{id}/analytics:
    get:
      operationId: getDoctorAnalytics
      tags: [doctors]
      summary: Doctor analytics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: range
          in: query
          schema:
            type: string
            enum: [week, month, 3months]
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorAnalytics"

  /doctors/{id}/queue:
    get:
      operationId: getDoctorQueue
      tags: [doctors]
      summary: Live queue for doctor today
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Live queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorQueue"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientProfile"

  /patients/{id}/dashboard:
    get:
      operationId: getPatientDashboard
      tags: [patients]
      summary: Patient dashboard data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDashboard"

  /slots:
    get:
      operationId: getSlots
      tags: [slots]
      summary: Get doctor availability slots
      parameters:
        - name: doctorId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotListResponse"

    post:
      operationId: createSlot
      tags: [slots]
      summary: Create availability slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlotBody"
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"

  /slots/{id}:
    patch:
      operationId: updateSlot
      tags: [slots]
      summary: Update slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSlotBody"
      responses:
        "200":
          description: Updated slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"

    delete:
      operationId: deleteSlot
      tags: [slots]
      summary: Delete slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /appointments:
    get:
      operationId: getAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Appointments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentListResponse"

    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Slot unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}/cancel:
    post:
      operationId: cancelAppointment
      tags: [appointments]
      summary: Cancel appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}/complete:
    post:
      operationId: completeAppointment
      tags: [appointments]
      summary: Mark appointment complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteAppointmentBody"
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /reports:
    get:
      operationId: getReports
      tags: [reports]
      summary: List medical reports
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: reportType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"

    post:
      operationId: createReport
      tags: [reports]
      summary: Upload report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /prescriptions:
    get:
      operationId: getPrescriptions
      tags: [prescriptions]
      summary: List prescriptions
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: doctorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Prescriptions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionListResponse"

    post:
      operationId: createPrescription
      tags: [prescriptions]
      summary: Create prescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrescriptionBody"
      responses:
        "201":
          description: Prescription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"

  /reviews:
    get:
      operationId: getReviews
      tags: [reviews]
      summary: List reviews
      parameters:
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"

    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /leave-blocks:
    get:
      operationId: getLeaveBlocks
      tags: [doctors]
      summary: Get doctor leave blocks
      parameters:
        - name: doctorId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave blocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveBlockListResponse"

    post:
      operationId: createLeaveBlock
      tags: [doctors]
      summary: Create leave block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaveBlockBody"
      responses:
        "201":
          description: Leave block created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveBlock"

  /leave-blocks/{id}:
    delete:
      operationId: deleteLeaveBlock
      tags: [doctors]
      summary: Delete leave block
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /emergency:
    get:
      operationId: getEmergencyCases
      tags: [emergency]
      summary: List emergency cases
      responses:
        "200":
          description: Emergency cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyCaseListResponse"

    post:
      operationId: createEmergencyCase
      tags: [emergency]
      summary: Create emergency case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmergencyCaseBody"
      responses:
        "201":
          description: Emergency case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyCase"

  /emergency/er-status:
    get:
      operationId: getErStatus
      tags: [emergency]
      summary: Get nearby ER status
      responses:
        "200":
          description: ER status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErStatusResponse"

  /emergency/ambulance:
    post:
      operationId: requestAmbulance
      tags: [emergency]
      summary: Request ambulance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmbulanceRequestBody"
      responses:
        "200":
          description: Ambulance dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmbulanceResponse"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Global search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [all, doctors, reports]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/pending-doctors:
    get:
      operationId: getPendingDoctors
      tags: [admin]
      summary: Get pending doctor approvals
      responses:
        "200":
          description: Pending doctors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorListResponse"

  /admin/doctors/{id}/approve:
    post:
      operationId: approveDoctor
      tags: [admin]
      summary: Approve doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/doctors/{id}/reject:
    post:
      operationId: rejectDoctor
      tags: [admin]
      summary: Reject doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectDoctorBody"
      responses:
        "200":
          description: Doctor rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{id}/toggle-active:
    post:
      operationId: toggleUserActive
      tags: [admin]
      summary: Toggle user active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        errors:
          type: array
          items:
            type: string
      required:
        - success
        - message

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [patient, doctor, admin]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        patientId:
          type: ["integer", "null"]
        doctorId:
          type: ["integer", "null"]
        isActive:
          type: boolean
      required:
        - id
        - name
        - email
        - role
        - isActive

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
      required:
        - users

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [patient, doctor]
        inviteCode:
          type: ["string", "null"]
      required:
        - name
        - email
        - password
        - role

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - accessToken
        - user

    Doctor:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        specialization:
          type: string
        qualification:
          type: string
        experienceYears:
          type: integer
        bio:
          type: ["string", "null"]
        consultationFee:
          type: number
        avgRating:
          type: number
        totalReviews:
          type: integer
        licenseNumber:
          type: string
        isApproved:
          type: boolean
      required:
        - id
        - userId
        - name
        - email
        - specialization
        - qualification
        - experienceYears
        - consultationFee
        - avgRating
        - totalReviews
        - licenseNumber
        - isApproved

    DoctorDetail:
      allOf:
        - $ref: "#/components/schemas/Doctor"
        - type: object
          properties:
            slots:
              type: array
              items:
                $ref: "#/components/schemas/Slot"

    DoctorListResponse:
      type: object
      properties:
        doctors:
          type: array
          items:
            $ref: "#/components/schemas/Doctor"
        total:
          type: integer
      required:
        - doctors
        - total

    UpdateDoctorBody:
      type: object
      properties:
        specialization:
          type: string
        qualification:
          type: string
        experienceYears:
          type: integer
        bio:
          type: string
        consultationFee:
          type: number
        avatarUrl:
          type: string

    DoctorDashboard:
      type: object
      properties:
        todayAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        queue:
          $ref: "#/components/schemas/DoctorQueue"
        stats:
          $ref: "#/components/schemas/DoctorStats"
        upcomingLeave:
          type: ["string", "null"]
      required:
        - todayAppointments
        - queue
        - stats

    DoctorStats:
      type: object
      properties:
        patientsToday:
          type: integer
        patientsThisWeek:
          type: integer
        avgRating:
          type: number
        totalCompleted:
          type: integer
      required:
        - patientsToday
        - patientsThisWeek
        - avgRating
        - totalCompleted

    DoctorQueue:
      type: object
      properties:
        currentToken:
          type: ["integer", "null"]
        nextTokens:
          type: array
          items:
            $ref: "#/components/schemas/QueueToken"
        totalRemaining:
          type: integer
      required:
        - nextTokens
        - totalRemaining

    QueueToken:
      type: object
      properties:
        tokenNumber:
          type: integer
        patientName:
          type: string
        status:
          type: string
        estimatedWaitMins:
          type: integer
      required:
        - tokenNumber
        - patientName
